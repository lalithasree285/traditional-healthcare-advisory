<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Log In — Traditional Healthcare Advisory</title>
<link rel="icon" href="assets/logo.svg">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div class="topbar">
    <div class="brand">
      <img src="assets/logo.svg" alt="logo">
      <div>Traditional Healthcare Advisory
        <small>Ayurveda • Homeopathy • Wellness</small>
      </div>
    </div>
    <div class="nav-user" id="navUser"></div>
  </div>

  <main>
    <div class="center-card" id="loginCard">
      <!-- filled by script -->
    </div>
  </main>

  <footer>Educational information only — not a medical diagnosis.</footer>

  <script src="js/data.js"></script>
  <script src="js/auth.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      renderNavUser(document.getElementById("navUser"));
      const user = getCurrentUser();
      const card = document.getElementById("loginCard");

      if(user){
        card.innerHTML = `
          <div style="font-size:2.4rem;">🌿</div>
          <h2 style="color:var(--teal-900);margin:8px 0 2px;">${greetingWord()}, ${escapeHtml(user.name)}!</h2>
          <p style="color:var(--muted);">You're already logged in on this device.</p>
          <a class="btn-primary" href="index.html" style="display:block;text-decoration:none;">Go to Home</a>
        `;
        return;
      }

      card.innerHTML = `
        <div style="font-size:2.4rem;">🔐</div>
        <h2 style="color:var(--teal-900);margin:8px 0 2px;">Log In</h2>
        <p style="color:var(--muted);margin-top:0;font-size:.9rem;">Enter your username and password.</p>

        <form id="loginForm">
          <div>
            <label for="loginUsername">Username</label>
            <input type="text" id="loginUsername" placeholder="e.g. priya123" required>
          </div>
          <div>
            <label for="loginPassword">Password</label>
            <input type="password" id="loginPassword" placeholder="Your password" required>
          </div>
          <div id="loginError" class="form-error" style="display:none;"></div>
          <button class="btn-primary" type="submit">Log In</button>
        </form>

        <p class="form-alt">Don't have an account? <a href="signup.html" style="color:var(--teal-600);font-weight:600;">Sign Up</a></p>
      `;

      document.getElementById("loginForm").addEventListener("submit", (e) => {
        e.preventDefault();
        const username = document.getElementById("loginUsername").value;
        const password = document.getElementById("loginPassword").value;
        const errorEl = document.getElementById("loginError");

        const result = loginUser(username, password);
        if(!result.ok){
          errorEl.textContent = result.error;
          errorEl.style.display = "block";
          return;
        }

        window.location.href = "index.html";
      });
    });
  </script>
</body>
</html>
