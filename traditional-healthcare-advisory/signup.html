<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign Up — Traditional Healthcare Advisory</title>
<link rel="icon" href="assets/logo.svg">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div class="topbar">
    <div class="brand">
      <img src="assets/logo.svg" alt="logo">
      <div>Traditional Healthcare Advisory
        <small>Ayurveda • Homeopathy • Wellness</small>
      </div>
    </div>
    <div class="nav-user" id="navUser"></div>
  </div>

  <main>
    <div class="center-card">
      <div style="font-size:2.4rem;">🌿</div>
      <h2 style="color:var(--teal-900);margin:8px 0 2px;">Create your account</h2>
      <p style="color:var(--muted);margin-top:0;font-size:.9rem;">Choose a username and password to save your account on this device.</p>

      <form id="signupForm">
        <div>
          <label for="nameInput">Your Name</label>
          <input type="text" id="nameInput" placeholder="e.g. Priya Sharma" required>
        </div>
        <div>
          <label for="usernameInput">Username</label>
          <input type="text" id="usernameInput" placeholder="e.g. priya123" required>
        </div>
        <div>
          <label for="passwordInput">Password</label>
          <input type="password" id="passwordInput" placeholder="At least 4 characters" required>
        </div>
        <div>
          <label for="confirmInput">Confirm Password</label>
          <input type="password" id="confirmInput" placeholder="Re-enter your password" required>
        </div>
        <div id="signupError" class="form-error" style="display:none;"></div>
        <button class="btn-primary" type="submit">Sign Up</button>
      </form>

      <p class="form-alt">Already have an account? <a href="login.html" style="color:var(--teal-600);font-weight:600;">Log In</a></p>
    </div>
  </main>

  <footer>Educational information only — not a medical diagnosis.</footer>

  <script src="js/data.js"></script>
  <script src="js/auth.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      renderNavUser(document.getElementById("navUser"));

      document.getElementById("signupForm").addEventListener("submit", (e) => {
        e.preventDefault();
        const name = document.getElementById("nameInput").value;
        const username = document.getElementById("usernameInput").value;
        const password = document.getElementById("passwordInput").value;
        const confirm = document.getElementById("confirmInput").value;
        const errorEl = document.getElementById("signupError");

        if(password !== confirm){
          errorEl.textContent = "Passwords do not match.";
          errorEl.style.display = "block";
          return;
        }

        const result = signUpUser(name, username, password);
        if(!result.ok){
          errorEl.textContent = result.error;
          errorEl.style.display = "block";
          return;
        }

        window.location.href = "index.html";
      });
    });
  </script>
</body>
</html>
